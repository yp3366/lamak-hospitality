[build]
  publish = "public"
  functions = "netlify/functions"

[dev]
  port = 8888

[[redirects]]
  from = "/api/auth/*"
  to = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from = "/api/users/*"
  to = "/.netlify/functions/users"
  status = 200

[[redirects]]
  from = "/api/users"
  to = "/.netlify/functions/users"
  status = 200

[[redirects]]
  from = "/api/attendance/*"
  to = "/.netlify/functions/attendance"
  status = 200

[[redirects]]
  from = "/api/attendance"
  to = "/.netlify/functions/attendance"
  status = 200

[[redirects]]
  from = "/api/subunits"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/api/subunits/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/api/announcements"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/api/announcements/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/api/events"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/api/events/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/api/messages"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/api/messages/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/api/notifications"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/api/notifications/*"
  to = "/.netlify/functions/api"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
